name: Unit Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        package:
          - program-boilerplate
          - component-boilerplate
          - stencil-grapes-plugin
          - mint-components
          - integration-boilerplate-node
          - express-boilerplate

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fa = v6.0.2

      - name: Use Node.js
        id: setup-node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 53b83 = v6.3.0
        with:
          node-version: 22.x

      - name: Install Dependencies
        id: install-deps
        working-directory: packages/${{ matrix.package }}
        run: |
          npm ci

      - name: Build
        id: build
        working-directory: packages/${{ matrix.package }}
        run: |
          npm run build --if-present

      - name: Run Tests
        id: run-tests
        working-directory: packages/${{ matrix.package }}
        run: |
          npm test
